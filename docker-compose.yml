services:
    postgres:
        image: postgres:18.4-alpine
        container_name: stedi-postgres
        volumes:
            - postgres_18_data:/var/lib/postgresql
        ports:
            - '${POSTGRES_PORT:-5432}:5432'
        environment:
            - POSTGRES_USER=${POSTGRES_USER:-stedi}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-stedipassword}
            - POSTGRES_DB=${POSTGRES_DB:-postgres}
        networks:
            - app-network
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
            interval: 5s
            timeout: 5s
            retries: 5

    minio:
        image: minio/minio:RELEASE.2025-09-07T16-13-09Z
        container_name: stedi-minio
        environment:
            MINIO_ROOT_USER: stedi
            MINIO_ROOT_PASSWORD: stedipassword
        volumes:
            - minio_data:/data
        ports:
            - '${MINIO_API_PORT:-9000}:9000'
            - '${MINIO_WEBUI_PORT:-9001}:9001'
        networks:
            - app-network
        command: server /data --console-address ':9001'
        healthcheck:
            test: ['CMD', 'mc', 'ready', 'local']
            interval: 5s
            timeout: 5s
            retries: 5

    mailpit:
        image: axllent/mailpit:v1.29.7
        container_name: stedi-mailpit
        ports:
            - '${MAILPIT_SMTP_PORT:-1025}:1025'
            - '${MAILPIT_WEBUI_PORT:-8025}:8025'
        networks:
            - app-network
        healthcheck:
            test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8025/livez']
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    postgres_18_data:
    minio_data:

networks:
    app-network:
        driver: bridge
