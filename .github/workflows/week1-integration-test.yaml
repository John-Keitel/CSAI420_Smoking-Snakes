name: Week 1 Integration Tests

on:
    push:
    repository_dispatch:
    workflow_dispatch:

permissions:
    actions: read
    checks: write
    contents: read

jobs:
    run-autograding-tests:
        if: github.actor != 'github-classroom[bot]'
        runs-on: ubuntu-latest
        env:
            API_URL: ${{ vars.API_URL }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'
                  cache: npm

            - name: Require the project API URL
              run: test -n "$API_URL"

            - name: Run Week 1 integration tests
              id: run-week-1-integration-tests
              uses: classroom-resources/autograding-command-grader@v1
              with:
                  test-name: Run Week 1 Integration Tests
                  setup-command: DATABASE_URL=postgresql://unused:unused@127.0.0.1:5432/unused npm ci
                  command: API_URL="${{ vars.API_URL }}" npm run test:integration
                  timeout: 10

            - name: Publish autograding result
              uses: classroom-resources/autograding-grading-reporter@v1
              env:
                  RUN-WEEK-1-INTEGRATION-TESTS_RESULTS: ${{ steps.run-week-1-integration-tests.outputs.result }}
              with:
                  runners: run-week-1-integration-tests
